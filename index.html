<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoWeb</title>

  <!-- JSXGraph -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jsxgraph/1.9.1/jsxgraph.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsxgraph/1.9.1/jsxgraphcore.min.js"></script>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="geoweb-body">

  <!-- ══════════════════════════════════════════
       LAYOUT PRINCIPAL
  ══════════════════════════════════════════ -->
  <div class="geoweb-layout">

    <!-- ── SIDEBAR ── -->
    <aside class="geoweb-sidebar">

      <!-- Logo / título -->
      <div class="sidebar-header">
        <span class="logo-icon">◈</span>
        <h1 class="logo-title">Geo<span class="logo-accent">Web</span></h1>
      </div>

      <!-- Herramientas -->
      <section class="sidebar-section">
        <p class="section-label">Herramienta</p>
        <div class="toolbar-grid">
          <button class="tool-btn" data-herramienta="punto">
            <span class="tool-icon">·</span>
            <span class="tool-name">Punto</span>
          </button>
          <button class="tool-btn" data-herramienta="segmento">
            <span class="tool-icon">╱</span>
            <span class="tool-name">Segmento</span>
          </button>
          <button class="tool-btn" data-herramienta="triangulo">
            <span class="tool-icon">△</span>
            <span class="tool-name">Triángulo</span>
          </button>
          <button class="tool-btn" data-herramienta="circulo">
            <span class="tool-icon">○</span>
            <span class="tool-name">Círculo</span>
          </button>
        </div>
      </section>

      <!-- Divisor -->
      <div class="sidebar-divider"></div>

      <!-- Panel de propiedades -->
      <section class="sidebar-section">
        <p class="section-label">Propiedades</p>

        <!-- Segmento -->
        <div class="prop-group" id="grupo-segmento">
          <p class="prop-group-title">Segmento</p>
          <div class="prop-row">
            <span class="prop-key">Distancia</span>
            <span class="prop-val" id="val-distancia">—</span>
          </div>
        </div>

        <!-- Triángulo -->
        <div class="prop-group" id="grupo-triangulo">
          <p class="prop-group-title">Triángulo</p>
          <div class="prop-row">
            <span class="prop-key">Área</span>
            <span class="prop-val" id="val-area">—</span>
          </div>
          <div class="prop-row">
            <span class="prop-key">Perímetro</span>
            <span class="prop-val" id="val-perimetro">—</span>
          </div>
          <div class="prop-row">
            <span class="prop-key">∠ A</span>
            <span class="prop-val" id="val-angulo-a">—</span>
          </div>
          <div class="prop-row">
            <span class="prop-key">∠ B</span>
            <span class="prop-val" id="val-angulo-b">—</span>
          </div>
          <div class="prop-row">
            <span class="prop-key">∠ C</span>
            <span class="prop-val" id="val-angulo-c">—</span>
          </div>
        </div>

        <!-- Círculo -->
        <div class="prop-group" id="grupo-circulo">
          <p class="prop-group-title">Círculo</p>
          <div class="prop-row">
            <span class="prop-key">Radio</span>
            <span class="prop-val" id="val-radio">—</span>
          </div>
          <div class="prop-row">
            <span class="prop-key">Diámetro</span>
            <span class="prop-val" id="val-diametro">—</span>
          </div>
          <div class="prop-row">
            <span class="prop-key">Área</span>
            <span class="prop-val" id="val-area-circulo">—</span>
          </div>
          <div class="prop-row">
            <span class="prop-key">Circunf.</span>
            <span class="prop-val" id="val-circunferencia">—</span>
          </div>
        </div>
      </section>

      <!-- Divisor -->
      <div class="sidebar-divider"></div>

      <!-- Limpiar -->
      <section class="sidebar-section">
        <button id="btn-limpiar" class="btn-limpiar">
          <span>✕</span> Limpiar tablero
        </button>
      </section>

    </aside>

    <!-- ── TABLERO ── -->
    <main class="geoweb-main">
      <div id="box" class="geoweb-board"></div>
    </main>

  </div>

  <!-- App -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
